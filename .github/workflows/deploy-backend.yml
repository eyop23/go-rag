name: Deploy Backend to VPS

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.25'

      - name: Build binary
        run: |
          go build -o rag-backend ./cmd/server/main.go
          chmod +x rag-backend

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          source: "rag-backend,data"
          target: /root/rag-backend

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: 22
          script: |
            cd /root/rag-backend

            # Create .env file from secrets
            cat > .env << 'ENVEOF'
            GOOGLE_API_KEY=${{ secrets.GOOGLE_API_KEY }}
            GEMINI_API_URL=${{ secrets.GEMINI_API_URL }}
            PINECONE_API_KEY=${{ secrets.PINECONE_API_KEY }}
            PINECONE_HOST=${{ secrets.PINECONE_HOST }}
            PORT=8090
            ENVEOF

            # Make binary executable
            chmod +x rag-backend

            # Create systemd service if it doesn't exist
            if [ ! -f /etc/systemd/system/rag-backend.service ]; then
              sudo tee /etc/systemd/system/rag-backend.service > /dev/null << 'SERVICEEOF'
            [Unit]
            Description=RAG Pipeline Chatbot Backend
            After=network.target

            [Service]
            Type=simple
            User=root
            WorkingDirectory=/root/rag-backend
            ExecStart=/root/rag-backend/rag-backend
            Restart=always
            RestartSec=5
            EnvironmentFile=/root/rag-backend/.env

            [Install]
            WantedBy=multi-user.target
            SERVICEEOF

              sudo systemctl daemon-reload
              sudo systemctl enable rag-backend
            fi

            # Restart the service
            sudo systemctl restart rag-backend

            # Show status
            sleep 2
            sudo systemctl status rag-backend --no-pager
